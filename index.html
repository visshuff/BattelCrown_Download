<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download BATTEL CROWN - Esports</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #050810;
            --card-bg: rgba(13, 18, 29, 0.7);
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --text-light: #ffffff;
            --text-muted: #8b9bb4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Glow */
        .bg-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 210, 255, 0.2) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulseGlow 4s infinite alternate;
            z-index: 0;
        }

        @keyframes pulseGlow {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        }

        /* Glassmorphism Card */
        .download-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 210, 255, 0.2);
            border-radius: 24px;
            padding: 40px 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            z-index: 1;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(50px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* App Logo Animation */
        .app-logo {
            width: 110px;
            height: 110px;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0, 210, 255, 0.4);
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
            border: 2px solid rgba(0, 210, 255, 0.3);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); box-shadow: 0 20px 30px rgba(0, 210, 255, 0.2); }
        }

        .app-title {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #ffffff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .app-subtitle {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 25px;
        }

        /* Info Grid (Version & Size) */
        .info-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .info-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 12px;
            flex: 1;
        }

        .info-box i {
            color: var(--primary);
            font-size: 16px;
            margin-bottom: 5px;
            display: block;
        }

        .info-box span {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-box strong {
            display: block;
            font-size: 16px;
            color: white;
            margin-top: 2px;
        }

        /* Premium Download Button */
        .download-btn {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: white;
            border: none;
            padding: 16px 20px;
            width: 100%;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .download-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.5s ease;
        }

        .download-btn:hover::before {
            left: 100%;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(0, 210, 255, 0.4);
        }

        .download-btn:active {
            transform: translateY(2px);
            box-shadow: 0 5px 10px rgba(0, 210, 255, 0.2);
        }

        .security-badge {
            margin-top: 20px;
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }
        
        .security-badge i {
            color: #00e676;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="download-card">
        <img src="https://visshuff.github.io/BattelCrown_Esports/logo.png" alt="Battel Crown Logo" class="app-logo">
        
        <h1 class="app-title">BATTEL CROWN</h1>
        <p class="app-subtitle">Play, Compete & Win Esports Tournaments</p>

        <div class="info-grid">
            <div class="info-box">
                <i class="fas fa-code-branch"></i>
                <span>Version</span>
                <strong>2.1</strong>
            </div>
            <div class="info-box">
                <i class="fas fa-hdd"></i>
                <span>Size</span>
                <strong>5.1 MB</strong>
            </div>
        </div>

        <button class="download-btn" id="dl-btn" onclick="startDownload()">
            <i class="fas fa-download"></i> <span id="btn-text">DOWNLOAD APK</span>
        </button>

        <div class="security-badge">
            <i class="fas fa-shield-alt"></i> 100% Secure & Verified Download
        </div>
    </div>

    <script>
        function startDownload() {
            const btn = document.getElementById('dl-btn');
            const btnText = document.getElementById('btn-text');
            
            // Button animation state
            btn.style.background = 'linear-gradient(135deg, #00e676, #00c853)';
            btn.style.boxShadow = '0 10px 20px rgba(0, 230, 118, 0.3)';
            btnText.innerHTML = "DOWNLOADING...";
            btn.querySelector('i').className = "fas fa-spinner fa-spin";
            
            // Redirect to the APK file
            setTimeout(() => {
                window.location.href = "https://visshuff.github.io/BattelCrown_Download/BattelCrown_2.1.apk";
                
                // Reset button after 3 seconds
                setTimeout(() => {
                    btn.style.background = 'linear-gradient(135deg, var(--secondary), var(--primary))';
                    btn.style.boxShadow = '0 10px 20px rgba(0, 210, 255, 0.3)';
                    btnText.innerHTML = "DOWNLOAD AGAIN";
                    btn.querySelector('i').className = "fas fa-download";
                }, 3000);
            }, 800); // Slight delay for premium feel
        }
    </script>
</body>
</html>
